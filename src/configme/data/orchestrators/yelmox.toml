# yelmox orchestrator: couples yelmo + FastIsostasy (+ optional rembo1) and is
# itself a buildable package with its own config/Makefile template.
#
# This is the shipped seed manifest. A cloned yelmox carrying its own
# .configme/manifest.toml takes precedence (see docs/DESIGN.md sec. 3).

[orchestrator]
name = "yelmox"
org = "fesmc"
repo = "yelmox"
dir = "yelmox"
config_style = "makefile-template"

# The full default set installed by `configme install yelmox`, in build order.
default_packages = [
    "fesm-utils",
    "coordinates",
    "yelmo",
    "FastIsostasy",
    "FastHydrology",
    "rembo1",
]

# FastHydrology is cloned inside yelmo's checkout (yelmo/FastHydrology), not at
# the orchestrator root — this is declared generally by yelmo's `nest` link
# (see packages/yelmo.toml), so it holds in every orchestrator, not just here.

# Typed post-config extras (see docs/DESIGN.md sec. 12). Each is a built-in
# handler; user/machine-specific values (hpc/account, data paths) are read from
# .configme/config.toml or prompted — never shipped, never arbitrary shell.
[orchestrator.extras]
pip_package = ["runme"]       # install the `runme` command if missing
runme_config = true           # `runme config init` + patch .runme/config.toml
data_link = ["ice_data", "isostasy_data"]   # link runtime data dirs

# Components are cloned as sub-packages directly under the orchestrator dir
# (yelmox/yelmo, yelmox/fesm-utils, ...), so the orchestrator references them
# directly and needs no root-level links. Inter-component links (e.g.
# yelmox/yelmo/fesm-utils -> ../fesm-utils) come from each package's own
# [[package.links]].
