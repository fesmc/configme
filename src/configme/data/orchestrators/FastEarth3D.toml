# FastEarth3D orchestrator (alex-robinson/FastEarth3D).
#
# Open-source 3D solid-Earth model (viscoelastic + sea-level equation). Its
# config/Makefile is already configme-shaped — it carries the <COMPILER_CONFIGURATION>
# placeholder and `include config/common.mk` — so configme generates the Makefile
# directly (config_style = "makefile-template"): template + the central
# machine/compiler fragment + the repo's config/common.mk + auto-detected netCDF.
# This supersedes the repo's own config.py / config/<machine>_<compiler> flat files.
# configme also manages the single component dependency — fesm-utils — pinning it
# to the branch FastEarth3D requires.
#
# fe_remap (conservative lon-lat -> Gauss remapping) uses the `coords` module,
# which lives on the fesm-utils `coords-dev` branch; the `:coords-dev` ref below
# pins it (overridable per checkout via .configme/manifest.toml deps).

[orchestrator]
name = "FastEarth3D"
org = "alex-robinson"
repo = "FastEarth3D"
dir = "FastEarth3D"
config_style = "makefile-template"

# fesm-utils, pinned to coords-dev (provides the `coords` module fe_remap needs).
# Cloned at the FastEarth3D root as fesm-utils/ (the package's default dir), which
# is exactly where config/common.mk expects the symlink/checkout.
default_packages = ["fesm-utils:coords-dev"]
