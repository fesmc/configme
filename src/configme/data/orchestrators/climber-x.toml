# climber-x orchestrator (cxesmc/climber-x).
#
# Layout: like every other orchestrator, configme clones climber-x's external
# component repos directly at the climber-x root (fesm-utils/, yelmo/,
# FastEarth3D/). This matches the modern config/common.mk shipped on the
# climber-x side; the legacy flat config/<machine>_<compiler> files have been
# updated to the same root paths so `config.py` and `configme` agree.
#
# yelmo is pinned to its `climber-x` branch via the `:climber-x` ref on the
# component name below.
#
# Optional, private components (bgc, vilma) are attempted on every install but
# skipped with a summary note for users without access (see optional_packages).
# They live inside climber-x's own src/ tree, so component_paths overrides their
# location (everything else clones at the root).

[orchestrator]
name = "climber-x"
org = "cxesmc"
repo = "climber-x"
dir = "climber-x"
config_style = "makefile-template"

# Managed components configme clones/configures/links, in build order. Each is
# cloned at the climber-x root (its default package dir); `yelmo:climber-x`
# pins the yelmo `climber-x` branch.
default_packages = ["fesm-utils", "yelmo:climber-x", "FastEarth3D"]

# Optional components (private repos): attempted on install, but a clone failure
# (no access) is a soft skip recorded as "unavailable" — never a hard failure.
#   * bgc   — HAMOCC ocean biogeochemistry (carries the M4AGO submodule).
#   * vilma — VILMA solid-earth model (prebuilt lib for the FULL build variant).
#             Its prebuilt libraries are per-HPC, so it pins the `@machine`
#             sentinel: configme picks the right branch for the detected machine
#             from vilma's `machine_refs` map (packages/vilma.toml). A user who
#             wants a specific branch overrides it in .configme/manifest.toml.
optional_packages = ["bgc", "vilma:@machine"]

# Auxiliary/data repos cloned at the climber-x root, outside the build graph.
#   * climber-x-input — large CLIMBER-X input data on GitLab, cloned into
#     ./input. Clone-only and `clone_policy = "prompt"` (its traits live in
#     packages/climber-x-input.toml), so install asks before the (large) clone
#     and upgrade refreshes it only when already present.
data_packages = ["climber-x-input"]

# bgc and vilma live inside climber-x's src/ tree (not at the root).
[orchestrator.component_paths]
bgc = "src/bgc"
vilma = "src/vilma"

# Typed post-config extras (see docs/DESIGN.md sec. 12).
[orchestrator.extras]
pip_package = ["runme"]       # install the `runme` command if missing
runme_config = true           # `runme config init` + patch .runme/config.toml
