# climber-x orchestrator (cxesmc/climber-x).
#
# climber-x places its component packages at nested paths under src/ (unlike
# yelmox, which uses the repo root), so component_paths overrides where each
# managed component lives.
#
# Two items are intentionally NOT encoded yet and need confirmation:
#   * vilma — climber-x links a `vilma` solid-earth library (src/vilma,
#     vega_pism.a). It has no discoverable upstream (no .gitmodules entry), so
#     it is treated as an UNMANAGED external (like PETSc): provided by the user
#     at src/vilma and referenced from climber-x's common.mk. Add it as a
#     managed package here once its upstream org/repo is known.
#   * climber-x's own config/common.mk is not yet authored (its template uses
#     FULL/CLIM build variants with CPPFLAGS_CLIM/FULL that the current flat
#     configs don't all define). Until then configme uses the legacy fallback
#     (its existing flat config/<machine>_<compiler>) to configure climber-x.

[orchestrator]
name = "climber-x"
org = "cxesmc"
repo = "climber-x"
dir = "climber-x"
config_style = "makefile-template"

# Managed components configme can clone/configure/link.
default_packages = ["fesm-utils", "coordinates", "yelmo"]

# Where each managed component lives, relative to the climber-x root.
[orchestrator.component_paths]
fesm-utils = "src/utils/fesm-utils"
coordinates = "src/utils/coordinates"
yelmo = "src/yelmo"
