# fesm-utils: the FESM shared utility library (libfesmutils) plus the vendored
# external libraries FFTW, LIS and SHTns.
#
# A single makefile-template package. configme generates the repo-root Makefile
# from config/Makefile (writing MACHINE/COMPILER, the compiler/machine fragments
# and netCDF), then builds everything via `make openmp={0,1} all` — which builds
# the external libraries (fftw/lis/shtns, via their autotools, keyed on
# MACHINE/COMPILER in config/libs.mk) and the utils static library.
#
# (Previously this was a build.py package with a `fesm-utils/utils` subpackage;
# the repo was flattened so utils lives at the root and one `make` drives it all.)

[package]
name = "fesm-utils"
org = "fesmc"
repo = "fesm-utils"
dir = "fesm-utils"
config_style = "makefile-template"

[package.build]
# `make all` = the external libraries (fftw/lis/shtns) + the utils static lib.
make_target = "all"
variants = ["serial", "omp"]

# Library files `make all` produces, per variant (paths relative to the checkout).
# `configme status` probes these to report build completeness.
[package.artifacts]
serial = [
    "include-serial/libfesmutils.a",
    "fftw/fftw-serial/lib/libfftw3.a",
    "lis/lis-serial/lib/liblis.a",
    "SHTns/shtns-serial/lib/libshtns.a",
]
omp = [
    "include-omp/libfesmutils.a",
    "fftw/fftw-omp/lib/libfftw3.a",
    "lis/lis-omp/lib/liblis.a",
    "SHTns/shtns-omp/lib/libshtns_omp.a",
]
