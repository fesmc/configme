# fesm-utils: shared utility libraries. The repo's own build.py drives the
# autotools build of LIS + FFTW (slow); its makefile-template `utils` component
# is configured/built by configme as the `fesm-utils/utils` subpackage.
#
# Structural outlier: no config/Makefile template at the repo root. Its top-level
# "configuration" is the autotools build, so configme treats it as a build.py
# package (see docs/DESIGN.md sec. 8) and delegates utils to the subpackage.

[package]
name = "fesm-utils"
org = "fesmc"
repo = "fesm-utils"
dir = "fesm-utils"
config_style = "build.py"
# fesm-utils is build.py at the top (autotools build of LIS + FFTW), and carries
# a makefile-template `utils` component as a contained subpackage. config_styles
# is informational (shown by `configme list`); config_style drives behaviour.
config_styles = ["build.py", "makefile-template"]
# utils lives inside this checkout; configme configures and builds it as a
# separate node that rides along wherever fesm-utils goes.
subpackages = ["fesm-utils/utils"]

# Library files build.py produces, per variant (paths relative to the fesm-utils
# checkout). `configme status` probes these to report whether the autotools
# build of LIS + FFTW is complete for each variant.
[package.artifacts]
serial = ["lis-serial/lib/liblis.a", "fftw-serial/lib/libfftw3.a"]
omp = ["lis-omp/lib/liblis.a", "fftw-omp/lib/libfftw3.a"]
