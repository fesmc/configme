# rembo1: regional energy-moisture balance atmosphere model.

[package]
name = "rembo1"
org = "alex-robinson"
repo = "rembo1"
dir = "rembo1"
config_style = "makefile-template"

# rembo1's former `coordinates` dependency is gone — that functionality now lives
# inside fesm-utils, which rembo1 links instead. (coordinates remains a supported
# package for any consumer that still wants it standalone.)
[[package.links]]
dep = "fesm-utils"
