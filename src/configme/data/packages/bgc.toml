# bgc: HAMOCC ocean biogeochemistry (used by climber-x's bgc build variants).
#
# Private repo (cxesmc/bgc): access is granted on request under the MPI-ESM
# license, so most users will not have it. Declared `optional` — configme
# attempts the clone and, if it is inaccessible, records it as "unavailable" in
# the summary instead of failing the install.
#
# It carries the M4AGO submodule (`submodules = true` -> `git submodule update
# --init --recursive` after clone) and is compiled by climber-x's own Makefile,
# so configme does not configure it (`config_style = "none"`).

[package]
name = "bgc"
org = "cxesmc"
repo = "bgc"
dir = "bgc"
config_style = "none"
optional = true
submodules = true
