# tracer: Lagrangian tracer particles advected through an ice-sheet domain.
#
# Used by yelmo's %trc passive-tracer subsystem, so yelmo.toml nests it at
# yelmo/tracer (see the elsa/tracer link entries there). Can still be installed
# stand-alone with `configme install tracer --only`.

[package]
name = "tracer"
org = "fesmc"
repo = "tracer"
dir = "tracer"
config_style = "makefile-template"

# tracer uses the ncio and nml modules from fesm-utils; it carries no netCDF
# calls of its own. This links tracer/fesm-utils -> fesm-utils.
[[package.links]]
dep = "fesm-utils"
