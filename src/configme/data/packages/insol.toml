# insol: orbital solution and insolation library (libinsol).
#
# Provides daily-mean insolation for any latitude and any time between -5 Ma
# and +1 Ma from the Laskar et al. (2004) orbital elements, plus a surface
# irradiance decomposition (DNI/DHI) used for renewable energy applications.
#
# Standalone: it has no external library dependencies (no netCDF, no
# fesm-utils) and builds with only a Fortran compiler. Not currently a
# component of any orchestrator -- yelmox vendors the insolation source
# directly under libs/insol -- so it is listed here to be cloned and configured
# on its own (`configme install insol`).

[package]
name = "insol"
org = "fesmc"
repo = "insol"
dir = "insol"
config_style = "makefile-template"

[package.build]
make_target = "static"

[package.artifacts]
serial = ["libinsol/include/libinsol.a"]
