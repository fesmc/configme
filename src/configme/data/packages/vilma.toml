# vilma: VILMA solid-earth model (used by climber-x's fully-coupled build).
#
# Private repo (cxesmc/vilma): access is granted on request, so most users will
# not have it. Declared `optional` — configme attempts the clone and, if it is
# inaccessible, records it as "unavailable" in the summary instead of failing.
#
# Provides a prebuilt library (vega_pism.a) and headers referenced by climber-x's
# FULL build variant; configme clones it but does not configure or build it
# (`config_style = "none"`).

[package]
name = "vilma"
org = "cxesmc"
repo = "vilma"
dir = "vilma"
config_style = "none"
optional = true
