# fesm-utils/utils: the FESM shared utility library (libfesmutils).
#
# A component contained in the fesm-utils checkout — it is NOT cloned on its own
# (`clone = false`) and cannot be an install primary; it rides along whenever
# fesm-utils is installed. configme generates its Makefile from the central
# machine/compiler fragments (its own config/common.mk + config/Makefile
# template) and, on `configme install fesm-utils`, optionally builds it via
# `make openmp={0,1} fesmutils-static` in the inherited environment.
#
# org/repo are the parent repo's (used only by `configme list`; never cloned).

[package]
name = "fesm-utils/utils"
org = "fesmc"
repo = "fesm-utils"
dir = "fesm-utils/utils"
config_style = "makefile-template"
clone = false

[package.build]
make_target = "fesmutils-static"
variants = ["serial", "omp"]

# The static library `make fesmutils-static` produces, per variant (paths
# relative to the utils checkout). `configme status` probes these to report
# whether the build is complete.
[package.artifacts]
serial = ["include-serial/libfesmutils.a"]
omp = ["include-omp/libfesmutils.a"]
